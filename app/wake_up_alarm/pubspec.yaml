name: wake_up_alarm
description: An alarm app that makes you prove you are awake by finding objects around you.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  alarm: ^5.4.1
  camera: ^0.12.0+1
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  google_mlkit_object_detection: ^0.15.1
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.5
  uuid: ^4.5.3

  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
